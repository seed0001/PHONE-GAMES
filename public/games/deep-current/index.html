<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Deep Current — Pocket Arcade</title>
<link rel="stylesheet" href="/games/engine/runner.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
<style>
  :root {
    --rn-bg: #04121f;
    --rn-panel: #0d2438;
    --rn-border: #1d4a6b;
    --rn-accent: #2ec4d6;
  }
</style>
</head>
<body>
<div id="game-root">
  <header id="rn-top">
    <a class="home" href="/">←</a>
    <div class="stat">📏 <span id="ui-dist">0</span></div>
    <div class="stat">🫧 <span id="ui-coins">0</span></div>
    <div class="stat">⭐ <span id="ui-score">0</span></div>
    <div class="title">🌊 Deep<br>Current</div>
  </header>
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <div id="zone-banner"></div>
    <div id="combo-meter"><span class="cm-x">×</span><span class="cm-n">0</span><span class="cm-label">STREAK</span></div>
  </div>
  <div id="rn-bottom">
    <button id="btn-jump">⬆ RISE</button>
    <button id="btn-slide">⬇ DIVE</button>
    <button id="btn-pause">⏸</button>
  </div>
  <div class="hint">Tap to rise · tap again for a second kick · swipe down to dive</div>
  <div id="overlay" hidden></div>
</div>
<script src="/games/engine/runner-engine.js"></script>
<script src="config.js"></script>
</body>
</html>
