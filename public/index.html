<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pocket Arcade</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>">
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <a class="logo" href="/">🕹️ Pocket <span>Arcade</span></a>
    <div class="user-chip">
      <span>Hey, <b id="username">…</b></span>
      <a class="nav-link" href="/stats">📊 Stats</a>
      <button class="btn ghost" id="logout">Log out</button>
    </div>
  </header>

  <div id="categories"></div>

  <footer>Pocket Arcade — tiny games, big fun</footer>
</div>

<script src="/js/catalog.js"></script>
<script>
const root = document.getElementById('categories');

function card(g, cat, bests) {
  const best = bests[g.id];
  const bestTxt = best
    ? `Best: ${best.score.toLocaleString()}${cat.showWave ? ` (wave ${best.wave})` : ''}`
    : 'Not played yet';
  return `
    <a class="game-card" href="/games/${g.id}/">
      <div class="art" style="background:${g.art}">${g.emoji}</div>
      <div class="info">
        <h3>${g.name}</h3>
        <p>${g.desc}</p>
        <div class="meta">
          <span class="badge">${cat.badge || cat.name}</span>
          <span class="${best ? 'best' : ''}">${bestTxt}</span>
        </div>
      </div>
    </a>`;
}

function render(bests) {
  root.innerHTML = CATEGORIES.map((cat, i) => {
    const body = cat.games.length
      ? `<div class="game-grid">${cat.games.map(g => card(g, cat, bests)).join('')}</div>`
      : `<div class="coming-soon">${cat.soon || 'Coming soon 🚧'}</div>`;
    return `
      <h2 class="section-title"${i ? ' style="margin-top:34px"' : ''}>${cat.name}</h2>
      ${body}`;
  }).join('');
}

async function init() {
  try {
    const me = await fetch('/api/me').then(r => r.ok ? r.json() : Promise.reject());
    document.getElementById('username').textContent = me.username;
  } catch { location.href = '/login'; return; }
  let bests = {};
  try { bests = await fetch('/api/me/scores').then(r => r.json()); } catch {}
  render(bests);
}

document.getElementById('logout').onclick = async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login';
};

render({});
init();
</script>
</body>
</html>
