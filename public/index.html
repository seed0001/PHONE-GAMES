<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pocket Arcade</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>">
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <a class="logo" href="/">🕹️ Pocket <span>Arcade</span></a>
    <div class="user-chip">
      <span>Hey, <b id="username">…</b></span>
      <button class="btn ghost" id="logout">Log out</button>
    </div>
  </header>

  <h2 class="section-title">Tower Defense</h2>
  <div class="game-grid" id="game-grid"></div>

  <h2 class="section-title" style="margin-top:34px">More Coming Soon</h2>
  <div class="coming-soon">New games drop here as they're added. Check back soon! 🚧</div>

  <footer>Pocket Arcade — tiny games, big fun</footer>
</div>

<script>
const GAMES = [
  {
    id: 'castle-siege', name: 'Castle Siege', emoji: '🏰',
    desc: 'Classic medieval defense. Archers, catapults and wizards vs the goblin horde.',
    art: 'linear-gradient(135deg,#2d5a27,#1a3a17)'
  },
  {
    id: 'neon-breach', name: 'Neon Breach', emoji: '🤖',
    desc: 'A rogue AI is flooding the grid. Deploy turrets and firewalls to stop the swarm.',
    art: 'linear-gradient(135deg,#0b1030,#2a0a4a)'
  },
  {
    id: 'void-bastion', name: 'Void Bastion', emoji: '🛸',
    desc: 'Deep-space station defense. Lasers and singularities vs the alien armada.',
    art: 'linear-gradient(135deg,#050514,#1a1040)'
  },
  {
    id: 'grave-shift', name: 'Grave Shift', emoji: '🧟',
    desc: 'The dead are restless. Hold the graveyard with holy fire and bone-crushing wards.',
    art: 'linear-gradient(135deg,#1a1a24,#2d1f38)'
  }
];

const grid = document.getElementById('game-grid');

function render(bests) {
  grid.innerHTML = GAMES.map(g => {
    const best = bests[g.id];
    const bestTxt = best ? `Best: ${best.score.toLocaleString()} (wave ${best.wave})` : 'Not played yet';
    return `
      <a class="game-card" href="/games/${g.id}/">
        <div class="art" style="background:${g.art}">${g.emoji}</div>
        <div class="info">
          <h3>${g.name}</h3>
          <p>${g.desc}</p>
          <div class="meta">
            <span class="badge">Tower Defense</span>
            <span class="${best ? 'best' : ''}">${bestTxt}</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

async function init() {
  try {
    const me = await fetch('/api/me').then(r => r.ok ? r.json() : Promise.reject());
    document.getElementById('username').textContent = me.username;
  } catch { location.href = '/login'; return; }
  let bests = {};
  try { bests = await fetch('/api/me/scores').then(r => r.json()); } catch {}
  render(bests);
}

document.getElementById('logout').onclick = async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login';
};

render({});
init();
</script>
</body>
</html>
